<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAK Kine - Evaluación Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        .bak-green { background-color: #5a8260; }
        .bak-light { background-color: #f2ecde; }
        .card-bak { background: white; border-radius: 20px; box-shadow: 0 4px 15px -5px rgba(0,0,0,0.1); overflow: hidden; }
        .input-bak { width: 100%; padding: 12px; background: #f9f7f2; border-radius: 12px; border: 1px solid #e2dfd8; outline: none; margin-bottom: 8px; }
        .logo-container { width: 65px; height: 65px; display: flex; align-items: center; justify-content: center; background: white; border-radius: 50%; overflow: hidden; border: 2px solid white; }
        .logo-container img { width: 100%; height: 100%; object-fit: cover; }
        .btn-tab { padding: 10px; border-radius: 10px; font-weight: bold; font-size: 12px; transition: 0.3s; background: #e2dfd8; }
        .btn-tab.active { background: #5a8260; color: white; }
    </style>
</head>
<body class="bak-light min-h-screen pb-24 font-sans text-stone-800">

    <header class="bak-green p-4 shadow-lg flex justify-between items-center text-white sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="logo-container"><img src="logo.png" alt="BAK"></div>
            <h1 class="font-bold text-xl tracking-tight">BAK <span class="font-light text-white/80">Kine</span></h1>
        </div>
        <span id="total" class="text-[10px] bg-black/20 px-3 py-1 rounded-full font-bold uppercase tracking-widest uppercase">Cargando...</span>
    </header>

    <main id="pantalla-lista" class="max-w-md mx-auto p-4">
        <div class="relative mb-6">
            <input type="text" id="busqueda" onkeyup="render()" placeholder="Buscar paciente..." class="w-full p-4 pl-12 rounded-2xl border-none shadow-md outline-none focus:ring-2 focus:ring-green-600">
            <span class="absolute left-4 top-4 opacity-30">🔍</span>
        </div>
        <div id="lista" class="space-y-4"></div>
        <button onclick="abrirModalNuevo()" class="fixed bottom-8 right-8 bak-green text-white w-16 h-16 rounded-full shadow-2xl text-4xl font-bold">+</button>
    </main>

    <main id="pantalla-detalle" class="max-w-md mx-auto p-4 hidden">
        <button onclick="irALista()" class="mb-4 text-stone-500 flex items-center gap-1 font-bold">← Volver</button>
        
        <div class="flex gap-2 mb-4 overflow-x-auto pb-2">
            <button id="tab-datos" onclick="switchTab('datos')" class="btn-tab active">DATOS</button>
            <button id="tab-evolucion" onclick="switchTab('evolucion')" class="btn-tab">EVOLUCIÓN</button>
            <button id="tab-evaluacion" onclick="switchTab('evaluacion')" class="btn-tab">EVALUACIÓN TÉCNICA</button>
        </div>

        <div id="sec-datos" class="card-bak p-6">
            <h2 class="text-xl font-bold text-[#5a8260] mb-4">Información</h2>
            <input type="hidden" id="edit-fbkey">
            <label class="text-[10px] font-bold text-stone-400 uppercase">Nombre</label><input type="text" id="edit-nom" class="input-bak">
            <label class="text-[10px] font-bold text-stone-400 uppercase">WhatsApp</label><input type="tel" id="edit-tel" class="input-bak" placeholder="549...">
            <label class="text-[10px] font-bold text-stone-400 uppercase">Diagnóstico Médico</label><input type="text" id="edit-diag" class="input-bak">
            <label class="text-[10px] font-bold text-stone-400 uppercase">Antecedentes</label><textarea id="edit-ant" class="input-bak" rows="3"></textarea>
            <div class="flex gap-2 pt-2">
                <button onclick="actualizarPaciente()" class="flex-1 bak-green text-white py-3 rounded-xl font-bold">Actualizar</button>
                <button onclick="abrirWsp()" class="bg-green-500 text-white p-3 rounded-xl shadow-md">WSP</button>
            </div>
            <button onclick="eliminarPaciente()" class="w-full mt-4 text-xs text-red-400">Eliminar Paciente</button>
        </div>

        <div id="sec-evolucion" class="hidden space-y-4">
            <div class="card-bak p-4">
                <input type="date" id="fecha-nota" class="input-bak">
                <textarea id="texto-nota" placeholder="¿Qué trabajamos hoy?..." class="input-bak" rows="2"></textarea>
                <button onclick="agregarNota()" class="w-full py-3 bak-green text-white rounded-xl font-bold">Guardar Sesión</button>
            </div>
            <div id="notas-lista" class="space-y-3"></div>
        </div>

        <div id="sec-evaluacion" class="hidden space-y-4">
            <div class="card-bak p-4">
                <h3 class="font-bold mb-3">Nueva Evaluación Física</h3>
                <select id="eval-zona" class="input-bak" onchange="cambiarCamposEvaluacion()">
                    <option value="">Seleccionar Zona...</option>
                    <option value="hombro">Hombro</option>
                    <option value="cervical">Cervical</option>
                    <option value="lumbar">Lumbar</option>
                    <option value="rodilla">Rodilla</option>
                    <option value="cadera">Cadera</option>
                    <option value="tobillo">Tobillo</option>
                </select>
                <div id="campos-especificos" class="bg-stone-50 p-3 rounded-xl mb-3 hidden">
                    </div>
                <button id="btn-guardar-eval" class="hidden w-full py-3 bg-blue-600 text-white rounded-xl font-bold" onclick="guardarEvaluacion()">Registrar Evaluación</button>
            </div>
            <div id="eval-historial" class="space-y-3"></div>
        </div>
    </main>

    <div id="modal-nuevo" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-[60]">
        <div class="bg-white w-full max-w-sm rounded-[30px] p-8">
            <h2 class="text-2xl font-bold mb-6">Nuevo Paciente</h2>
            <input type="text" id="nuevo-nom" placeholder="Nombre completo *" class="input-bak">
            <input type="number" id="nuevo-edad" placeholder="Edad *" class="input-bak">
            <div class="flex gap-3 mt-4">
                <button onclick="cerrarModalNuevo()" class="flex-1 py-4 bg-stone-100 rounded-2xl">Cancelar</button>
                <button onclick="guardarNuevo()" class="flex-1 py-4 bak-green text-white rounded-2xl font-bold">Crear</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB0vjffS2rNP5qwXhlFZfZ3Iay_ZE10j0U",
            authDomain: "bak-kine.firebaseapp.com",
            databaseURL: "https://bak-kine-default-rtdb.firebaseio.com/",
            projectId: "bak-kine",
            storageBucket: "bak-kine.firebasestorage.app",
            messagingSenderId: "611797844037",
            appId: "1:611797844037:web:56c049f07d9ad7a0ad232c"
        };

        firebase.initializeApp(firebaseConfig);
        const dbRef = firebase.database().ref('pacientes');
        let db = [];
        const testsConfig = {
            hombro: [
                { id:'jobe', n:'Jobe (Empty Can)', d:'Brazos 90° abd, 30° horiz y rot. interna. Presión hacia abajo. (+) Dolor/debilidad = Supraespinoso.' },
                { id:'hawkins', n:'Hawkins-Kennedy', d:'Brazo flex 90°, codo 90°. Rotación interna pasiva rápida. (+) Dolor = Pinzamiento subacromial.' },
                { id:'arco', n:'Arco Doloroso', d:'Abducción activa. (+) Dolor entre 60° y 120°.' }
            ],
            cervical: [
                { id:'spurling', n:'Spurling', d:'Inclinación lateral y presión axial sobre cabeza. (+) Dolor irradiado = Compromiso radicular.' },
                { id:'distraccion', n:'Distracción', d:'Tracción ascendente manual de la cabeza. (+) Alivio del dolor = Compresión nerviosa.' },
                { id:'rom', n:'Rango de Movimiento', d:'Evaluar flexión, extensión y rotaciones. Valor esperado: Movimiento fluido sin mareos.' }
            ],
            lumbar: [
                { id:'lasegue', n:'Lasegue (SLR)', d:'Elevación de pierna extendida. (+) Dolor irradiado entre 30° y 70° = Ciática/Hernia.' },
                { id:'bragard', n:'Bragard', d:'Lasegue + Dorsiflexión del pie. (+) Aumento de dolor = Origen radicular.' },
                { id:'psoas', n:'Psoas Test', d:'Resistencia a la flexión de cadera. (+) Dolor = Irritación del psoas o zona lumbar.' }
            ],
            rodilla: [
                { id:'lachman', n:'Lachman', d:'Rodilla en 20-30° flex. Tracción anterior de tibia. (+) Desplazamiento = LCA.' },
                { id:'cajon', n:'Cajón Anterior', d:'Rodilla 90° flex. Tracción anterior tibia. (+) Laxitud = LCA.' },
                { id:'mcmurray', n:'McMurray', d:'Flexión máxima + rotación y extensión. (+) Chasquido/Dolor = Meniscos.' }
            ],
            cadera: [
                { id:'faber', n:'Faber (Patrick)', d:'Flexión, Abducción, Ext. Rot (4 sobre la otra pierna). (+) Dolor = Art. Sacroilíaca o cadera.' },
                { id:'fadir', n:'Fadir', d:'Flexión, Aducción, Int. Rot. (+) Dolor = Choque femoroacetabular.' }
            ],
            tobillo: [
                { id:'cajonant', n:'Cajón Anterior Tobillo', d:'Tracción anterior del astrágalo. (+) Desplazamiento = Lig. Peroneoastragalino anterior.' },
                { id:'thompson', n:'Thompson', d:'Presión en gemelo con paciente boca abajo. (+) Ausencia de plantiflexión = Rotura Tendón Aquiles.' }
            ]
        };

        dbRef.on('value', (snapshot) => {
            const data = snapshot.val();
            db = data ? Object.keys(data).map(key => ({...data[key], fbKey: key})) : [];
            render();
            document.getElementById('total').innerText = db.length + " PACIENTES";
        });

        function render() {
            const q = document.getElementById('busqueda').value.toLowerCase();
            const listado = document.getElementById('lista');
            listado.innerHTML = '';
            db.filter(p => p.nombre.toLowerCase().includes(q)).forEach(p => {
                const item = document.createElement('div');
                item.className = "card-bak p-5 border-l-[6px] border-[#5a8260] cursor-pointer active:scale-95 transition-all";
                item.innerHTML = `<div><h3 class="font-bold text-lg">${p.nombre}</h3><p class="text-xs text-stone-400 uppercase tracking-tighter">${p.diagnostico || 'SIN DIAGNÓSTICO'}</p></div>`;
                item.onclick = () => verDetalle(p.fbKey);
                listado.appendChild(item);
            });
        }

        function verDetalle(fbKey) {
            const p = db.find(x => x.fbKey == fbKey);
            document.getElementById('edit-fbkey').value = fbKey;
            document.getElementById('edit-nom').value = p.nombre;
            document.getElementById('edit-tel').value = p.tel || '';
            document.getElementById('edit-diag').value = p.diagnostico || '';
            document.getElementById('edit-ant').value = p.antecedentes || '';
            document.getElementById('fecha-nota').value = new Date().toISOString().split('T')[0];
            renderNotas(p.notes || []);
            renderEvalHistorial(p.evaluaciones || []);
            document.getElementById('pantalla-lista').classList.add('hidden');
            document.getElementById('pantalla-detalle').classList.remove('hidden');
            switchTab('datos');
        }

        function cambiarCamposEvaluacion() {
            const zona = document.getElementById('eval-zona').value;
            const container = document.getElementById('campos-especificos');
            const btn = document.getElementById('btn-guardar-eval');
            if(!zona) { container.classList.add('hidden'); btn.classList.add('hidden'); return; }
            
            container.innerHTML = `<h4 class="text-[10px] font-bold text-blue-600 mb-2 uppercase">Tests para ${zona}</h4>`;
            testsConfig[zona].forEach(t => {
                container.innerHTML += `
                    <div class="mb-4 border-b border-stone-200 pb-2">
                        <p class="text-xs font-bold">${t.n}</p>
                        <p class="text-[9px] text-stone-500 mb-2 italic">${t.d}</p>
                        <select id="test-${t.id}" class="w-full p-2 text-xs rounded-lg border border-stone-300">
                            <option value="Negativo">Negativo (Normal)</option>
                            <option value="Positivo">Positivo (+)</option>
                            <option value="Dudoso">Dudoso / Doloroso</option>
                            <option value="No realizado">No realizado</option>
                        </select>
                    </div>`;
            });
            container.innerHTML += `<textarea id="eval-obs" placeholder="Observaciones extras..." class="input-bak text-xs"></textarea>`;
            container.classList.remove('hidden');
            btn.classList.remove('hidden');
        }

        function guardarEvaluacion() {
            const key = document.getElementById('edit-fbkey').value;
            const zona = document.getElementById('eval-zona').value;
            const p = db.find(x => x.fbKey == key);
            const evaluaciones = p.evaluaciones || [];
            
            let resultados = { zona: zona, fecha: new Date().toLocaleDateString(), tests: {} };
            testsConfig[zona].forEach(t => {
                resultados.tests[t.n] = document.getElementById(`test-${t.id}`).value;
            });
            resultados.observaciones = document.getElementById('eval-obs').value;

            evaluaciones.unshift(resultados);
            firebase.database().ref('pacientes/' + key).update({ evaluaciones: evaluaciones });
            
            document.getElementById('eval-zona').value = '';
            cambiarCamposEvaluacion();
            alert("Evaluación técnica guardada.");
        }

        function renderEvalHistorial(evals) {
            document.getElementById('eval-historial').innerHTML = evals.map(e => `
                <div class="card-bak p-4 bg-blue-50/50 border border-blue-100">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-bold text-blue-700 uppercase text-xs">${e.zona}</span>
                        <span class="text-[10px] text-stone-400">${e.fecha}</span>
                    </div>
                    <div class="text-[11px] space-y-1">
                        ${Object.entries(e.tests).map(([name, val]) => `<div><strong>${name}:</strong> ${val}</div>`).join('')}
                    </div>
                    ${e.observaciones ? `<p class="text-[10px] mt-2 bg-white p-2 rounded italic text-stone-500">Obs: ${e.observaciones}</p>` : ''}
                </div>`).join('');
        }

        function switchTab(tab) {
            ['datos', 'evolucion', 'evaluacion'].forEach(t => {
                document.getElementById('sec-' + t).classList.add('hidden');
                document.getElementById('tab-' + t).classList.remove('active');
            });
            document.getElementById('sec-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab).classList.add('active');
        }

        // --- FUNCIONES BÁSICAS (IGUAL QUE ANTES) ---
        function irALista() { document.getElementById('pantalla-lista').classList.remove('hidden'); document.getElementById('pantalla-detalle').classList.add('hidden'); }
        function abrirModalNuevo() { document.getElementById('modal-nuevo').classList.remove('hidden'); }
        function cerrarModalNuevo() { document.getElementById('modal-nuevo').classList.add('hidden'); }
        function guardarNuevo() {
            const nom = document.getElementById('nuevo-nom').value;
            const edad = document.getElementById('nuevo-edad').value;
            if(!nom || !edad) return alert("Faltan datos");
            dbRef.push({ nombre: nom, edad: edad, notes: [], evaluaciones: [] });
            cerrarModalNuevo();
        }
        function actualizarPaciente() {
            const key = document.getElementById('edit-fbkey').value;
            firebase.database().ref('pacientes/' + key).update({
                nombre: document.getElementById('edit-nom').value,
                tel: document.getElementById('edit-tel').value,
                diagnostico: document.getElementById('edit-diag').value,
                antecedentes: document.getElementById('edit-ant').value
            });
            alert("Sincronizado");
        }
        function agregarNota() {
            const key = document.getElementById('edit-fbkey').value;
            const t = document.getElementById('texto-nota').value;
            if(!t) return;
            const p = db.find(x => x.fbKey == key);
            const notes = p.notes || [];
            notes.unshift({ fecha: document.getElementById('fecha-nota').value, texto: t });
            firebase.database().ref('pacientes/' + key).update({ notes: notes });
            document.getElementById('texto-nota').value = '';
        }
        function renderNotas(notas) {
            document.getElementById('notas-lista').innerHTML = notas.map(n => `
                <div class="card-bak p-4 border-l-4 border-stone-200">
                    <p class="text-[10px] font-bold text-green-700 uppercase">${n.fecha}</p>
                    <p class="text-sm text-stone-600">${n.texto}</p>
                </div>`).join('');
        }
        function abrirWsp() { const t = document.getElementById('edit-tel').value; if(t) window.open(`https://wa.me/${t}`, '_blank'); }
        function eliminarPaciente() { if(confirm("¿Eliminar?")) { firebase.database().ref('pacientes/' + document.getElementById('edit-fbkey').value).remove(); irALista(); } }
    </script>
</body>
</html>
